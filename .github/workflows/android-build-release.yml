name: Android CI & Auto Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew
        continue-on-error: true # Safe fallback if wrapper is not committed

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build with Gradle
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Find and Rename APK
        run: |
          mkdir -p build-artifacts
          find . -name "*.apk" -exec cp {} build-artifacts/GripTrainer-debug.apk \;

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GripTrainer-debug-apk
          path: build-artifacts/GripTrainer-debug.apk

  release:
    name: Create Auto Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: GripTrainer-debug-apk
          path: release-artifacts

      - name: Generate Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/GripTrainer-debug.apk
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Release {0}', github.ref_name) || 'آخرین نسخه بیلد شده (Latest Build)' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            نسخه آزمایشی تمرینیار هنگبرد با موفقیت بیلد شد. 🎉
            
            ویژگی‌های کلیدی این نسخه:
            - راهنمای کامل برنامه ۱۲ هفته‌ای بدنسازی سنگ‌نوردی
            - تایمر شمارش معکوس دایره‌ای تعاملی و زیبا
            - تقویم تمرین ۳۶ جلسه‌ای صخره‌نورد به همراه ثبت درجه سختی
            - ثبت رکوردهای آویزان شدن و تعداد بارفیکس در گزارش پیشرفت
            - سیستم هشدار و یادآوری منظم روزانه برای تمرینات
            - پشتیبانی کامل از زبان فارسی، چینش راست‌چین (RTL) و حالت تاریک (Dark Mode) پویا
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
