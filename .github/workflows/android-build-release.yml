name: Android CI & Auto Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew
        continue-on-error: true # Safe fallback if wrapper is not committed

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build with Gradle
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Find and Rename APK
        run: |
          mkdir -p build-artifacts
          find . -name "*.apk" -exec cp {} build-artifacts/GripTrainer-debug.apk \;

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GripTrainer-debug-apk
          path: build-artifacts/GripTrainer-debug.apk

  release:
    name: Create Auto Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: GripTrainer-debug-apk
          path: release-artifacts

      - name: Generate Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/GripTrainer-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            نسخه آزمایشی تمرینیار هنگبرد با موفقیت بیلد شد. 🎉
            
            تغییرات این نسخه:
            - راهنمای کامل برنامه ۱۲ هفته‌ای بدنسازی سنگ‌نوردی
            - تایمر شمارش معکوس دایره‌ای زیبا
            - تقویم تمرین صخره‌نورد
            - ثبت رکوردهای آویزان شدن و بارفیکس
            - پشتیبانی کامل از زبان فارسی و حالت تاریک (Dark Mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
